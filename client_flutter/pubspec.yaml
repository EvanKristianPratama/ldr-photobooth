name: ldr_photobooth
description: A gorgeous real-time LDR Photobooth app built with Flutter.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  
  # Kamera & WebRTC
  camera: ^0.10.5
  flutter_webrtc: ^0.10.2
  
  # Real-time WebSocket
  web_socket_channel: ^2.4.1
  socket_io_client: ^2.0.3+1
  
  # Image Processing & Canvas (useFrame.js equivalent)
  image: ^4.1.3
  
  # Path & Storage
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # Utils
  uuid: ^4.3.3
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Calculator
      fonts:
        - asset: assets/fonts/Calculator.ttf
