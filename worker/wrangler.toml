name = "ldr-photobooth"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "ROOM", class_name = "RoomDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]

# ── COMMUNITY DATABASE (D1) ──
[[d1_databases]]
binding = "DB"
database_name = "ldr-photobooth-db"
database_id = "10c4ff4c-1b7f-4e43-9ff8-ac4bc0468eac"

# ── COMMUNITY STORAGE (R2) ──
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ldr-photobooth-frames"

[vars]
MIDTRANS_CLIENT_KEY = "SB-Mid-client-owXNSzDK0hPZ8vRZ"
MIDTRANS_SERVER_KEY = "SB-Mid-server-BWUE1Wzf_X6lBLEWqGHSpvah"

